<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Resultado da Otimização</title>

  <link rel="stylesheet" href="./css/resultado.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>

<body>

<div class="page-wrapper">

  <header class="header">
    <div class="logo">
      <i class="ti ti-truck"></i>
      <span>Knapsack System</span>
    </div>
  </header>

  <main class="card">

    <div class="card-header">
      <h1>Resultado da Otimização</h1>
      <p>Melhor combinação de itens encontrada pelo algoritmo</p>
    </div>

    <section class="summary">

      <div class="metric">
        <span class="metric-label">Peso Utilizado</span>
        <span class="metric-value" id="peso-utilizado">850 / 1000 kg</span>
      </div>

      <div class="metric">
        <span class="metric-label">Volume Utilizado</span>
        <span class="metric-value" id="volume-utilizado">18 / 20 m³</span>
      </div>

      <div class="metric">
        <span class="metric-label">Valor Total</span>
        <span class="metric-value" id="valor-total">R$ 24.500</span>
      </div>

    </section>

    <section class="result-section">

      <h2>
        <i class="ti ti-circle-check"></i>
        Itens Selecionados
      </h2>

      <div id="itens-selecionados"></div>

    </section>

    <section class="result-section">

      <h2>
        <i class="ti ti-circle-x"></i>
        Itens Não Selecionados
      </h2>

      <div id="itens-rejeitados"></div>

    </section>

    <div class="card-footer">

      <button class="btn-secondary">
        <i class="ti ti-arrow-left"></i>
        Voltar
      </button>

      <button class="btn-primary">
        <i class="ti ti-file-download"></i>
        Gerar PDF
      </button>

    </div>

  </main>

</div>

<script src="./js/resultado.js"></script>

</body>
</html>
